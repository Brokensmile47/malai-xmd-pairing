<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malai-XMD Pairing</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🌟 Malai-XMD Premium Pairing 🌟</h1>
        <p>Enter your WhatsApp number to generate a pairing code.</p>

        <div class="pairing-form">
            <input type="text" id="phoneNumber" placeholder="Enter phone with country code">
            <button onclick="generateCode()">Generate Code</button>
        </div>

        <div class="session-box">
            <p>Session ID: <span id="sessionId">Malai-XXXXXXXX</span></p>
            <p>Code: <span id="pairingCode">----</span></p>
            <p id="timer"></p>
        </div>

        <div class="devices-section">
            <h2>Paired Devices</h2>
            <ul id="deviceList"></ul>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
